services:
  db:
    image: postgres:16
    container_name: tsukumogami-db
    environment:
      POSTGRES_DB: tsukumogami
      POSTGRES_USER: tsukumogami
      POSTGRES_PASSWORD: tsukumogami
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: tsukumogami-backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://tsukumogami:tsukumogami@db:5432/tsukumogami
    ports:
      - "5002:5002"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: tsukumogami-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres-data:
